<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Link inválido — Isso Te Afeta</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',system-ui,sans-serif;background:#FFFDF5;
  color:#1A2E1A;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{max-width:400px;width:100%;text-align:center}
.ico{font-size:3rem;margin-bottom:16px}
.title{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:600;
  color:#1A2E1A;margin-bottom:8px}
.msg{font-size:.9rem;color:#5A6A5A;line-height:1.6;margin-bottom:24px}
.brand{font-family:'Playfair Display',serif;font-style:italic;font-size:1.1rem;
  background:linear-gradient(135deg,#1B9AAA,#F4A825,#E8682A);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tag{font-size:.7rem;font-weight:800;letter-spacing:.15em;
  text-transform:uppercase;color:#9AAA9A;margin-top:4px}
</style>
</head>
<body>
<div class="card">
  <div class="ico">🔒</div>
  <h1 class="title">Link indisponível</h1>
  <p class="msg">{{ msg }}</p>
  <div class="brand">Isso Te Afeta</div>
  <div class="tag">@issoteafeta.oficial · Energia & Autoconhecimento</div>
</div>
</body>
</html>
